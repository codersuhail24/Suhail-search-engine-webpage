<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhail Smart Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    overflow:hidden;
    transition:0.4s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.dark{
    background:#0f172a !important;
}

#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    width:700px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    position:relative;
}

h1{
    margin-bottom:20px;
}

.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}

input[type="text"]{
    width:100%;
    padding:15px;
    border-radius:50px;
    border:none;
    margin-bottom:15px;
    font-size:16px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    margin:5px;
}

.drop-zone{
    border:2px dashed white;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
}

.preview img{
    max-width:200px;
    margin-top:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="toggle" onclick="toggleTheme()">🌙</div>

    <h1>Suhail Smart Browser 🚀</h1>

    <!-- Web Search -->
    <input type="text" id="searchInput" placeholder="Search anything...">
    <button onclick="searchWeb()">Web Search</button>
    <button onclick="startVoice()">🎤 Voice Search</button>

    <!-- Image Search -->
    <div class="drop-zone">
        <p>Upload or Drag & Drop Image for Search</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview" id="preview"></div>
</div>

<script>

// WEB SEARCH
function searchWeb(){
    let query=document.getElementById("searchInput").value;
    if(!query) return;
    window.open("https://www.google.com/search?q="+encodeURIComponent(query),"_blank");
}

// VOICE SEARCH (Works in Chrome HTTPS)
function startVoice(){
    if(!('webkitSpeechRecognition' in window)){
        alert("Voice search works only in Google Chrome over HTTPS.");
        return;
    }

    const recognition=new webkitSpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult=function(event){
        const speech=event.results[0][0].transcript;
        document.getElementById("searchInput").value=speech;
        searchWeb();
    };
}

// DARK MODE
function toggleTheme(){
    document.body.classList.toggle("dark");
}

// IMAGE SEARCH (Upload)
document.getElementById("fileInput").addEventListener("change",function(e){
    const file=e.target.files[0];
    if(!file) return;

    const imageURL=URL.createObjectURL(file);

    document.getElementById("preview").innerHTML=
    `<img src="${imageURL}">`;

    // Opens Google Images (manual upload page)
    window.open("https://images.google.com/","_blank");
});

// PARTICLE BACKGROUND
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

class Particle{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*3+1;
        this.speedX=Math.random()*1-0.5;
        this.speedY=Math.random()*1-0.5;
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        if(this.x>canvas.width||this.x<0) this.speedX*=-1;
        if(this.y>canvas.height||this.y<0) this.speedY*=-1;
    }
    draw(){
        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    particles=[];
    for(let i=0;i<100;i++){
        particles.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    init();
});
</script>

</body>
</html>

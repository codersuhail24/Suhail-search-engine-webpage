<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhail Smart Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    overflow:hidden;
    transition:0.4s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.dark{
    background:#0f172a !important;
}

#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    width:650px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    color:white;
    position:relative;
}

h1{
    font-size:32px;
    margin-bottom:30px;
    font-weight:600;
}

.search-wrapper{
    position:relative;
}

input{
    width:100%;
    padding:18px 60px 18px 25px;
    border-radius:50px;
    border:none;
    outline:none;
    font-size:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.icon{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:22px;
    cursor:pointer;
}

.suggestions{
    position:absolute;
    top:70px;
    width:100%;
    background:white;
    border-radius:15px;
    max-height:220px;
    overflow-y:auto;
    text-align:left;
    color:black;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.suggestions div{
    padding:12px 20px;
    cursor:pointer;
    transition:0.2s;
}

.suggestions div:hover,
.active{
    background:#e2e8f0;
}

.history{
    margin-top:25px;
    text-align:left;
    font-size:14px;
}

.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="toggle" onclick="toggleTheme()">🌙</div>

    <h1>Suhail's Browser 🚀</h1>

    <div class="search-wrapper">
        <input type="text" id="searchInput"
        placeholder="Search or type website URL..."
        autocomplete="off">
        <span class="icon" onclick="startVoice()">🎤</span>
        <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="history">
        <strong>Recent Searches:</strong>
        <div id="historyList"></div>
    </div>
</div>

<script>
const input=document.getElementById("searchInput");
const suggestions=document.getElementById("suggestions");
let selectedIndex=-1;

// LIVE SUGGESTIONS
input.addEventListener("keyup",function(e){
    const query=input.value.trim();

    if(e.key==="Enter"){ search(query); return; }
    if(e.key==="ArrowDown"){ navigate(1); return; }
    if(e.key==="ArrowUp"){ navigate(-1); return; }

    if(!query){ suggestions.innerHTML=""; return; }

    fetch(`https://api.duckduckgo.com/?q=${query}&format=json&pretty=1`)
    .then(res=>res.json())
    .then(data=>{
        suggestions.innerHTML="";
        selectedIndex=-1;

        data.RelatedTopics.slice(0,6).forEach(item=>{
            if(item.Text){
                const div=document.createElement("div");
                div.textContent=item.Text;
                div.onclick=()=>{
                    input.value=item.Text;
                    search(item.Text);
                };
                suggestions.appendChild(div);
            }
        });
    });
});

// KEYBOARD NAVIGATION
function navigate(direction){
    const items=suggestions.querySelectorAll("div");
    if(!items.length) return;

    selectedIndex+=direction;

    if(selectedIndex<0) selectedIndex=items.length-1;
    if(selectedIndex>=items.length) selectedIndex=0;

    items.forEach(i=>i.classList.remove("active"));
    items[selectedIndex].classList.add("active");
    input.value=items[selectedIndex].textContent;
}

// SEARCH FUNCTION
function search(query){
    if(!query) return;

    saveHistory(query);
    suggestions.innerHTML="";

    if(query.includes(".")&&!query.includes(" ")){
        if(!query.startsWith("http")){
            query="https://"+query;
        }
        window.open(query,"_blank");
    }else{
        window.open("https://www.google.com/search?q="+encodeURIComponent(query),"_blank");
    }
}

// SEARCH HISTORY
function saveHistory(query){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    history.unshift(query);
    history=[...new Set(history)].slice(0,5);
    localStorage.setItem("history",JSON.stringify(history));
    loadHistory();
}

function loadHistory(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    document.getElementById("historyList").innerHTML=
    history.map(item=>`<div>• ${item}</div>`).join("");
}
loadHistory();

// DARK MODE
function toggleTheme(){
    document.body.classList.toggle("dark");
}

// VOICE SEARCH
function startVoice(){
    const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    recognition.lang="en-US";
    recognition.start();
    recognition.onresult=function(event){
        const speech=event.results[0][0].transcript;
        input.value=speech;
        search(speech);
    }
}

// LIVE PARTICLE BACKGROUND
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

class Particle{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*3+1;
        this.speedX=Math.random()*1-0.5;
        this.speedY=Math.random()*1-0.5;
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        if(this.x>canvas.width||this.x<0) this.speedX*=-1;
        if(this.y>canvas.height||this.y<0) this.speedY*=-1;
    }
    draw(){
        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    particles=[];
    for(let i=0;i<100;i++){
        particles.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    init();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhail Smart Browser</title>

<!-- FIXED FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    overflow:hidden;
    transition:0.4s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.dark{
    background:#0f172a !important;
}

#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    width:720px;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(25px);
    padding:45px;
    border-radius:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 25px rgba(99,102,241,0.5);
    position:relative;
    overflow:hidden;
}

/* Decorative Emojis */
.container::before{
    content:"✨";
    position:absolute;
    top:20px;
    left:30px;
    font-size:50px;
    opacity:0.08;
}

.container::after{
    content:"🚀";
    position:absolute;
    bottom:20px;
    right:30px;
    font-size:60px;
    opacity:0.08;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    opacity:0.7;
}

input{
    width:100%;
    padding:15px;
    border-radius:50px;
    border:none;
    margin-top:15px;
    font-size:16px;
    outline:none;
}

button{
    padding:8px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin-top:15px;
    background:#6366f1;
    color:white;
}

.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
}

.preview img{
    max-width:200px;
    margin-top:15px;
    border-radius:15px;
}

.image-search-box{
    display:none;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="toggle" onclick="toggleTheme()">🌙</div>

    <h1>🚀 Suhail Smart Browser</h1>
    <div class="subtitle">🌐 Smart Search | 🖼 Image Search | 🎤 Voice Enabled</div>

    <!-- WEB SEARCH -->
    <input type="text" id="searchInput" placeholder="🔎 Search anything...">

    <button onclick="startVoice()">🎤 Voice Search</button>

    <hr style="margin:25px 0;opacity:0.2;">

    <!-- IMAGE SEARCH -->
    <p>🖼 Upload Image for Search</p>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview" id="preview"></div>

    <!-- Appears after upload -->
    <input type="text" id="imageSearchBox" class="image-search-box" placeholder="🔍 Search related keywords...">
</div>

<script>

/* ENTER TO SEARCH */
document.getElementById("searchInput").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        let query=this.value.trim();
        if(!query) return;

        if(query.includes(".") && !query.includes(" ")){
            if(!query.startsWith("http")){
                query="https://"+query;
            }
            window.open(query,"_blank");
        }else{
            window.open("https://www.google.com/search?q="+encodeURIComponent(query),"_blank");
        }
    }
});

/* IMAGE SEARCH AFTER UPLOAD */
document.getElementById("fileInput").addEventListener("change",function(e){
    const file=e.target.files[0];
    if(!file) return;

    const imageURL=URL.createObjectURL(file);

    document.getElementById("preview").innerHTML=
        `<img src="${imageURL}">`;

    document.getElementById("imageSearchBox").style.display="block";
});

/* ENTER TO SEARCH IMAGE KEYWORDS */
document.getElementById("imageSearchBox").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        let query=this.value.trim();
        if(!query) return;

        window.open("https://www.google.com/search?tbm=isch&q="+encodeURIComponent(query),"_blank");
    }
});

/* VOICE SEARCH */
function startVoice(){
    if(!('webkitSpeechRecognition' in window)){
        alert("Voice search works only in Chrome over HTTPS.");
        return;
    }

    const recognition=new webkitSpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult=function(event){
        document.getElementById("searchInput").value=
            event.results[0][0].transcript;
    };
}

/* DARK MODE */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* PARTICLE BACKGROUND */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

class Particle{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*3+1;
        this.speedX=Math.random()*1-0.5;
        this.speedY=Math.random()*1-0.5;
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        if(this.x>canvas.width||this.x<0) this.speedX*=-1;
        if(this.y>canvas.height||this.y<0) this.speedY*=-1;
    }
    draw(){
        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    particles=[];
    for(let i=0;i<100;i++){
        particles.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    init();
});
</script>

</body>
</html>
